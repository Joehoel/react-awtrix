pre-commit:
  parallel: true
  jobs:
    - name: lint-fix-ts
      glob: "src/**/*.ts"
      run: bunx oxlint --fix {staged_files}
      stage_fixed: true
    - name: lint-fix-tsx
      glob: "src/**/*.tsx"
      run: bunx oxlint --fix {staged_files}
      stage_fixed: true
    - name: format
      run: bunx oxfmt --write {staged_files}
      stage_fixed: true
