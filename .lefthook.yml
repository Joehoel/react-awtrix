pre-commit:
  parallel: true
  jobs:
    - name: lint-fix
      files: git diff --name-only --cached --diff-filter=ACMR | grep -E '^src/.*\.(ts|tsx)$' || true
      run: bunx oxlint --fix {files}
      stage_fixed: true
    - name: format
      files: git diff --name-only --cached --diff-filter=ACMR | grep -E '\.(ts|tsx|json|yml)$' || true
      run: bunx oxfmt --write {files}
      stage_fixed: true
